/* Uses the Claude Artifact storage API if present (window.storage) so data

      return res ? JSON.parse(res.value) : fallback;
    }
  } catch (e) {}
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {

/* ------------------------------ Persistence layer ------------------------------ */
/* Uses the Claude Artifact storage API if present (window.storage) so data
   auto-syncs for everyone sharing the login. If opened as a plain local file
   with no such API available, falls back to this browser's own storage so
   the app still works standalone (data then stays on this device only). */
function hasArtifactStorage() {
  return typeof window !== "undefined" && window.storage && typeof window.storage.get === "function";
}
async function loadPersisted(key, fallback) {
  try {
    if (hasArtifactStorage()) {
      const res = await window.storage.get(key, true);
      return res ? JSON.parse(res.value) : fallback;
    }
  } catch (e) {}
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) {
    return fallback;
  }
}
async function savePersisted(key, value) {
  try {
    if (hasArtifactStorage()) {
      await window.storage.set(key, JSON.stringify(value), true);
      return;
    }
  } catch (e) {}
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) {}
}

/* ------------------------------ Seed material master ------------------------------ */
function buildSeedMaterials() {
  const newRepair = [
    "25 KVA 3ph New T/F", "200 KVA Repair T/F", "100 KVA New T/F",
    "100 KVA Repair T/F", "100 KVA - M Repair", "63 KVA Repair T/F",
    "63 KVA - M Repair", "25 KVA 3ph Repair T/F", "16 KVA New T/F",
    "16 KVA Repair T/F", "25 KVA 1ph Repair T/F", "15 KVA Repair T/F",
  ];
  const fail = [
    "200 KVA Fail", "100 KVA Fail", "63 KVA Fail", "25 KVA Fail 3ph",
    "25 KVA Fail 1Ph", "15 KVA Fail 1Ph", "16 KVA Fail",
  ];
  const failAgp = [
    "200 KVA Fail AGP", "100 KVA Fail AGP", "63 KVA Fail AGP",
    "25 KVA Fail 3ph AGP", "25 KVA Fail 1Ph AGP", "15 KVA Fail 1Ph AGP",
    "16 KVA Fail AGP",
  ];
  const subCatFor = (name) => {
    if (/New T\/F/i.test(name)) return "New Transformer";
    if (/Repair/i.test(name)) return "Repair Transformer";
    return "Failed Transformer";
  };
  const groupFor = (arr, label) =>
    arr.map((name, i) => {
      const kvaMatch = name.match(/(\d+)\s*KVA/i);
      return {
        id: `${label}-${i + 1}`,
        code: `DTR-${label.slice(0, 2).toUpperCase()}-${String(i + 1).padStart(3, "0")}`,
        name, category: "Distribution Transformer (DTR)", subCategory: subCatFor(name),
        group: label, kva: kvaMatch ? Number(kvaMatch[1]) : null, unit: "Nos", qty: 0,
        minStock: label === "New/Repair" ? 2 : 0, maxStock: label === "New/Repair" ? 10 : 999,
        store: label === "Fail AGP" ? "Sub-Division Store" : "Division Store",
        location: label === "Fail AGP" ? "AGP Yard" : "Main Store Yard",
        status: "Active",
      };
    });
  return [...groupFor(newRepair, "New/Repair"), ...groupFor(fail, "Fail"), ...groupFor(failAgp, "Fail AGP")];
}

/* ------------------------------ Simple charts ------------------------------ */
function SimpleBarChart({ data, xKey, yKey, color, height = 220 }) {
  const max = Math.max(1, ...data.map((d) => d[yKey]));
  const barW = data.length ? Math.min(46, (100 / data.length) - 4) : 20;
  return (
    <div style={{ width: "100%", height, display: "flex", alignItems: "flex-end", gap: 8, padding: "0 4px", borderBottom: "1px solid #e2e8f0" }}>
      {data.map((d, i) => (
        <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-end", height: "100%" }}>
          <div style={{ fontSize: 11, color: "#475569", marginBottom: 4 }}>{d[yKey]}</div>
          <div style={{ width: "70%", maxWidth: 44, background: color, borderRadius: "4px 4px 0 0", height: `${(d[yKey] / max) * 82}%`, minHeight: d[yKey] > 0 ? 4 : 0, transition: "height .3s" }} />
          <div style={{ fontSize: 10.5, color: "#64748b", marginTop: 6, textAlign: "center" }}>{d[xKey]}</div>
        </div>
      ))}
    </div>
  );
}

function SimplePieChart({ data, colors, size = 200 }) {
  const total = data.reduce((s, d) => s + d.qty, 0) || 1;
  let angle = 0;
  const r = size / 2 - 6, cx = size / 2, cy = size / 2;
  const slices = data.map((d, i) => {
    const frac = d.qty / total;
    const start = angle;
    const end = angle + frac * 360;
    angle = end;
    const large = end - start > 180 ? 1 : 0;
    const toXY = (ang) => {
      const rad = (ang - 90) * Math.PI / 180;
      return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
    };
    const [x1, y1] = toXY(start), [x2, y2] = toXY(end);
    const path = frac >= 0.999
      ? `M ${cx} ${cy - r} A ${r} ${r} 0 1 1 ${cx - 0.01} ${cy - r} Z`
      : `M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`;
    return <path key={i} d={path} fill={colors[i % colors.length]} stroke="white" strokeWidth="1.5" />;
  });
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 20, flexWrap: "wrap" }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>{slices}</svg>
      <div>
        {data.map((d, i) => (
          <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12.5, marginBottom: 6 }}>
            <span style={{ width: 11, height: 11, borderRadius: 3, background: colors[i % colors.length], display: "inline-block" }} />
            {d.group}: <strong>{d.qty}</strong>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ------------------------------ Main app ------------------------------ */
function SIMMSAppInner({ onLogout }) {
  const [ready, setReady] = useState(false);
  const [materials, setMaterials] = useState([]);
  const [txns, setTxns] = useState([]);
  const [tab, setTab] = useState("dashboard");
  const [role, setRole] = useState("Administrator");
  const [search, setSearch] = useState("");
  const [toast, setToast] = useState(null);
  const [standalone, setStandalone] = useState(false);

  useEffect(() => {
    (async () => {
      setStandalone(!hasArtifactStorage());
      const seed = buildSeedMaterials();
      const m = await loadPersisted("simms:materials", seed);
      const t = await loadPersisted("simms:txns", []);
      setMaterials(m); setTxns(t); setReady(true);
    })();
  }, []);
  useEffect(() => { if (ready) savePersisted("simms:materials", materials); }, [materials, ready]);
  useEffect(() => { if (ready) savePersisted("simms:txns", txns); }, [txns, ready]);

  const showToast = useCallback((msg, kind = "success") => {
    setToast({ msg, kind }); setTimeout(() => setToast(null), 2600);
  }, []);

  const resetSeed = () => { setMaterials(buildSeedMaterials()); setTxns([]); showToast("Data reset to seed values."); };

  const stats = useMemo(() => {
    const totalMaterials = materials.length;
    const totalQty = materials.reduce((s, m) => s + Number(m.qty || 0), 0);
    const lowStock = materials.filter((m) => m.group === "New/Repair" && Number(m.qty) <= Number(m.minStock));
    const failPending = materials.filter((m) => m.group === "Fail").reduce((s, m) => s + Number(m.qty || 0), 0);
    const failAgpPending = materials.filter((m) => m.group === "Fail AGP").reduce((s, m) => s + Number(m.qty || 0), 0);
    const receiptsToday = txns.filter((t) => t.type === "Receipt" && t.date === today()).length;
    const issuesToday = txns.filter((t) => t.type === "Issue" && t.date === today()).length;
    const byGroup = ["New/Repair", "Fail", "Fail AGP"].map((g) => ({ group: g, qty: materials.filter((m) => m.group === g).reduce((s, m) => s + Number(m.qty || 0), 0) }));
    const byKva = {};
    materials.forEach((m) => { if (m.kva) byKva[m.kva] = (byKva[m.kva] || 0) + Number(m.qty || 0); });
    const kvaChart = Object.entries(byKva).map(([kva, qty]) => ({ kva: `${kva} KVA`, qty })).sort((a, b) => parseInt(a.kva) - parseInt(b.kva));
    return { totalMaterials, totalQty, lowStock, failPending, failAgpPending, receiptsToday, issuesToday, byGroup, kvaChart };
  }, [materials, txns]);

  const filteredMaterials = useMemo(() => {
    const q = search.trim().toLowerCase();
    if (!q) return materials;
    return materials.filter((m) => m.name.toLowerCase().includes(q) || m.code.toLowerCase().includes(q) || m.category.toLowerCase().includes(q) || m.subCategory.toLowerCase().includes(q));
  }, [materials, search]);

  const updateQty = (id, delta, type, meta = {}) => {
    setMaterials((prev) => prev.map((m) => (m.id === id ? { ...m, qty: Math.max(0, Number(m.qty) + delta) } : m)));
    setTxns((prev) => [{ id: uid(), date: today(), type, materialId: id, qty: Math.abs(delta), ...meta }, ...prev]);
  };

  const exportCSV = () => {
    const header = ["Code", "Name", "Category", "Sub-Category", "Store", "Location", "Unit", "Qty", "Min Stock", "Max Stock", "Status"];
    const rows = materials.map((m) => [m.code, m.name, m.category, m.subCategory, m.store, m.location, m.unit, m.qty, m.minStock, m.maxStock, m.status]);
    const csv = [header, ...rows].map((r) => r.map((v) => `"${v}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `SIMMS_Stock_Register_${today()}.csv`; a.click();
    URL.revokeObjectURL(url);
    showToast("Stock register exported as CSV.");
  };

  if (!ready) {
    return <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: 400, fontFamily: "'Segoe UI', Arial, sans-serif", color: BLUE }}>Loading SIMMS…</div>;
  }

  const NAV = [
    { key: "dashboard", label: "Dashboard", Icon: IconDashboard },
    { key: "materials", label: "Material Master", Icon: IconBox },
    { key: "receipt", label: "Material Receipt (GRN)", Icon: IconIn },
    { key: "issue", label: "Material Issue", Icon: IconOut },
    { key: "transfer", label: "Stock Transfer", Icon: IconSwap },
    { key: "deadstock", label: "Dead Stock / Scrap", Icon: IconTrash },
    { key: "reports", label: "Reports", Icon: IconReport },
  ];

  return (
    <div style={{ fontFamily: "'Segoe UI', Arial, sans-serif", background: BG, minHeight: "100vh", color: "#1f2937" }}>
      <header style={{ background: `linear-gradient(90deg, ${BLUE} 0%, ${BLUE_DARK} 100%)`, color: "white", padding: "10px 16px", display: "flex", alignItems: "center", gap: 12, position: "sticky", top: 0, zIndex: 30, borderBottom: `3px solid ${ORANGE}` }}>
        <div style={{ width: 42, height: 42, borderRadius: 8, background: ORANGE, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 15, flexShrink: 0 }}>MS</div>
        <div style={{ lineHeight: 1.2, flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 12, opacity: 0.85 }}>Maharashtra State Electricity Distribution Co. Ltd.</div>
          <div style={{ fontWeight: 700, fontSize: 15 }}>Office of the Executive Engineer, Sakoli Division <span style={{ opacity: 0.7, fontWeight: 400 }}>· Bhandara Circle</span></div>
          <div style={{ fontSize: 12 }}>Store Inventory &amp; Material Management System <span style={{ background: ORANGE, color: BLUE_DARK, borderRadius: 4, padding: "1px 6px", fontSize: 11, fontWeight: 700, marginLeft: 6 }}>v1.0</span></div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10, fontSize: 13 }}>
          <IconShield size={16} />
          <select value={role} onChange={(e) => setRole(e.target.value)} style={{ background: BLUE_DARK, color: "white", border: "1px solid rgba(255,255,255,0.3)", borderRadius: 6, padding: "5px 8px", fontSize: 13 }}>
            {ROLES.map((r) => <option key={r}>{r}</option>)}
          </select>
          <button onClick={onLogout} title="Log out" style={{ background: "rgba(255,255,255,0.12)", border: "1px solid rgba(255,255,255,0.3)", color: "white", borderRadius: 6, padding: "6px 9px", cursor: "pointer", display: "flex", alignItems: "center", gap: 5, fontSize: 12.5 }}>
            <IconLogout size={14} /> Log Out
          </button>
        </div>
      </header>

      {standalone && (
        <div style={{ background: "#fff7ed", borderBottom: "1px solid #fed7aa", color: "#9a3412", fontSize: 12.5, padding: "6px 16px", textAlign: "center" }}>
          Running as a standalone file — data auto-saves to this browser only. Open the same file in a different browser or computer and it will have its own separate data.
        </div>
      )}

      <div style={{ display: "flex", alignItems: "flex-start" }}>
        <nav style={{ width: 240, background: "white", minHeight: "calc(100vh - 76px)", borderRight: "1px solid #e2e8f0", padding: "14px 10px", flexShrink: 0 }}>
          {NAV.map(({ key, label, Icon: NavIcon }) => (
            <button key={key} onClick={() => setTab(key)} style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "10px 12px", marginBottom: 4, border: "none", borderRadius: 8, background: tab === key ? BLUE : "transparent", color: tab === key ? "white" : "#334155", fontWeight: tab === key ? 600 : 500, cursor: "pointer", fontSize: 13.5, textAlign: "left", borderLeft: tab === key ? `4px solid ${ORANGE}` : "4px solid transparent" }}>
              <NavIcon size={17} /> {label}
            </button>
          ))}
          <div style={{ marginTop: 18, padding: "10px 12px", fontSize: 11.5, color: "#94a3b8", borderTop: "1px solid #eef2f6" }}>
            Prototype build.{" "}
            <button onClick={resetSeed} style={{ color: BLUE, background: "none", border: "none", cursor: "pointer", textDecoration: "underline", padding: 0, fontSize: 11.5 }}>Reset demo data</button>
          </div>
        </nav>

        <main style={{ flex: 1, padding: 20, minWidth: 0 }}>
          <div style={{ marginBottom: 14, fontSize: 12, color: "#64748b", display: "flex", justifyContent: "space-between" }}>
            <span>Home / {NAV.find((n) => n.key === tab)?.label}</span>
            <span>Stock position as on {today()}</span>
          </div>

          {tab === "dashboard" && <Dashboard stats={stats} />}
          {tab === "materials" && <MaterialMaster materials={filteredMaterials} search={search} setSearch={setSearch} onEditQty={(id, qty) => setMaterials((prev) => prev.map((m) => (m.id === id ? { ...m, qty } : m)))} onExport={exportCSV} />}
          {tab === "receipt" && <ReceiptForm materials={materials} onSubmit={updateQty} showToast={showToast} />}
          {tab === "issue" && <IssueForm materials={materials} onSubmit={updateQty} showToast={showToast} />}
          {tab === "transfer" && <TransferForm materials={materials} onSubmit={updateQty} showToast={showToast} />}
          {tab === "deadstock" && <DeadStock materials={materials} txns={txns} onSubmit={updateQty} showToast={showToast} />}
          {tab === "reports" && <Reports materials={materials} txns={txns} onExport={exportCSV} />}
        </main>
      </div>

      {toast && (
        <div style={{ position: "fixed", bottom: 20, right: 20, background: toast.kind === "success" ? "#166534" : "#b91c1c", color: "white", padding: "10px 16px", borderRadius: 8, fontSize: 13.5, display: "flex", alignItems: "center", gap: 8, boxShadow: "0 6px 20px rgba(0,0,0,0.2)", zIndex: 50 }}>
          <IconCheck size={16} /> {toast.msg}
        </div>
      )}
    </div>
  );
}

function Card({ label, value, accent }) {
  return (
    <div style={{ background: "white", borderRadius: 10, padding: "14px 16px", border: "1px solid #e2e8f0", borderTop: `3px solid ${accent || BLUE}`, minWidth: 150, flex: "1 1 150px" }}>
      <div style={{ fontSize: 12, color: "#64748b", marginBottom: 6 }}>{label}</div>
      <div style={{ fontSize: 24, fontWeight: 700, color: "#0f172a" }}>{value}</div>
    </div>
  );
}
const PIE_COLORS = [BLUE, ORANGE, "#0ea5e9"];

function Dashboard({ stats }) {
  return (
    <div>
      <div style={{ display: "flex", gap: 12, flexWrap: "wrap", marginBottom: 18 }}>
        <Card label="Total Material Types" value={stats.totalMaterials} />
        <Card label="Total Units in Stock" value={stats.totalQty} accent={ORANGE} />
        <Card label="Receipts Today" value={stats.receiptsToday} />
        <Card label="Issues Today" value={stats.issuesToday} />
        <Card label="Low Stock (New/Repair)" value={stats.lowStock.length} accent="#dc2626" />
        <Card label="Failed T/F Pending Repair" value={stats.failPending} accent="#dc2626" />
        <Card label="Failed T/F at AGP" value={stats.failAgpPending} accent="#dc2626" />
      </div>
      {stats.lowStock.length > 0 && (
        <div style={{ background: "#fff7ed", border: "1px solid #fed7aa", borderRadius: 8, padding: "10px 14px", marginBottom: 18, display: "flex", gap: 8, alignItems: "center", fontSize: 13.5, color: "#9a3412" }}>
          <IconAlert size={16} /> {stats.lowStock.length} transformer type(s) at or below reorder level: {stats.lowStock.map((m) => m.name).join(", ")}
        </div>
      )}
      <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
        <div style={{ background: "white", borderRadius: 10, border: "1px solid #e2e8f0", padding: 16, flex: "1 1 380px" }}>
          <div style={{ fontWeight: 600, marginBottom: 12, fontSize: 14 }}>Stock by Group (Nos.)</div>
          <SimplePieChart data={stats.byGroup} colors={PIE_COLORS} />
        </div>
        <div style={{ background: "white", borderRadius: 10, border: "1px solid #e2e8f0", padding: 16, flex: "1 1 380px" }}>
          <div style={{ fontWeight: 600, marginBottom: 12, fontSize: 14 }}>Stock by Transformer Rating (KVA)</div>
          <SimpleBarChart data={stats.kvaChart} xKey="kva" yKey="qty" color={BLUE} />
        </div>
      </div>
    </div>
  );
}

function MaterialMaster({ materials, search, setSearch, onEditQty, onExport }) {
  return (
    <div style={{ background: "white", borderRadius: 10, border: "1px solid #e2e8f0", padding: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 10 }}>
        <div style={{ position: "relative", flex: "1 1 260px" }}>
          <span style={{ position: "absolute", left: 10, top: 10, color: "#94a3b8" }}><IconSearch size={15} /></span>
          <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search by material name, code or category…" style={{ width: "100%", padding: "9px 10px 9px 32px", borderRadius: 8, border: "1px solid #cbd5e1", fontSize: 13.5 }} />
        </div>
        <button onClick={onExport} style={btnStyle(ORANGE)}><IconDownload size={14} /> Export Stock Register (CSV)</button>
      </div>
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead>
            <tr style={{ background: "#f1f5f9", textAlign: "left" }}>
              {["Code", "Material Name", "Sub-Category", "Store", "Location", "Unit", "Qty on Hand", "Reorder Level", "Status"].map((h) => (
                <th key={h} style={{ padding: "9px 10px", borderBottom: "2px solid #e2e8f0", whiteSpace: "nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {materials.map((m) => {
              const low = m.group === "New/Repair" && Number(m.qty) <= Number(m.minStock);
              return (
                <tr key={m.id} style={{ borderBottom: "1px solid #f1f5f9" }}>
                  <td style={{ padding: "8px 10px", fontFamily: "monospace", color: "#475569" }}>{m.code}</td>
                  <td style={{ padding: "8px 10px", fontWeight: 500 }}>{m.name}</td>
                  <td style={{ padding: "8px 10px" }}>{m.subCategory}</td>
                  <td style={{ padding: "8px 10px" }}>{m.store}</td>
                  <td style={{ padding: "8px 10px" }}>{m.location}</td>
                  <td style={{ padding: "8px 10px" }}>{m.unit}</td>
                  <td style={{ padding: "8px 10px" }}>
                    <input type="number" min={0} value={m.qty} onChange={(e) => onEditQty(m.id, Math.max(0, Number(e.target.value)))} style={{ width: 64, padding: "4px 6px", borderRadius: 6, border: `1px solid ${low ? "#fca5a5" : "#cbd5e1"}`, background: low ? "#fef2f2" : "white" }} />
                  </td>
                  <td style={{ padding: "8px 10px" }}>{m.group === "New/Repair" ? m.minStock : "—"}</td>
                  <td style={{ padding: "8px 10px" }}>{low ? <span style={{ color: "#dc2626", fontWeight: 600, fontSize: 12 }}>Low Stock</span> : <span style={{ color: "#16a34a", fontWeight: 600, fontSize: 12 }}>{m.status}</span>}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{ marginTop: 10, fontSize: 12, color: "#94a3b8" }}>
        Tip: quantities are editable directly. Use Material Receipt / Issue to log a transaction with an audit entry instead of overwriting the quantity directly.
      </div>
    </div>
  );
}

function useMaterialSelect(materials) {
  const [materialId, setMaterialId] = useState(materials[0]?.id || "");
  useEffect(() => { if (!materials.find((m) => m.id === materialId) && materials[0]) setMaterialId(materials[0].id); }, [materials]);
  return [materialId, setMaterialId];
}

function FormShell({ title, children, onSubmit, submitLabel, submitColor }) {
  return (
    <form onSubmit={onSubmit} style={{ background: "white", borderRadius: 10, border: "1px solid #e2e8f0", padding: 20, maxWidth: 640 }}>
      <div style={{ fontWeight: 700, fontSize: 16, marginBottom: 14, color: BLUE }}>{title}</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>{children}</div>
      <button type="submit" style={{ ...btnStyle(submitColor || BLUE), marginTop: 16 }}><IconPlus size={14} /> {submitLabel}</button>
    </form>
  );
}

function ReceiptForm({ materials, onSubmit, showToast }) {
  const [materialId, setMaterialId] = useMaterialSelect(materials);
  const [qty, setQty] = useState(1);
  const [supplier, setSupplier] = useState("");
  const [invoice, setInvoice] = useState("");
  const [remarks, setRemarks] = useState("");
  const handle = (e) => {
    e.preventDefault();
    if (!materialId || qty <= 0) return;
    onSubmit(materialId, Number(qty), "Receipt", { supplier, invoice, remarks });
    showToast(`GRN recorded: +${qty} unit(s) received.`);
    setQty(1); setSupplier(""); setInvoice(""); setRemarks("");
  };
  return (
    <FormShell title="Material Receipt — Goods Receipt Note (GRN)" onSubmit={handle} submitLabel="Post Receipt">
      <div>
        <label style={fieldLabel}>Material</label>
        <select value={materialId} onChange={(e) => setMaterialId(e.target.value)} style={inputStyle}>
          {materials.map((m) => <option key={m.id} value={m.id}>{m.code} — {m.name}</option>)}
        </select>
      </div>
      <div style={{ display: "flex", gap: 12 }}>
        <div style={{ flex: 1 }}><label style={fieldLabel}>Quantity Received</label><input type="number" min={1} value={qty} onChange={(e) => setQty(e.target.value)} style={inputStyle} /></div>
        <div style={{ flex: 1 }}><label style={fieldLabel}>Invoice Number</label><input value={invoice} onChange={(e) => setInvoice(e.target.value)} style={inputStyle} placeholder="e.g. INV/2026/0142" /></div>
      </div>
      <div><label style={fieldLabel}>Supplier / Source</label><input value={supplier} onChange={(e) => setSupplier(e.target.value)} style={inputStyle} placeholder="Supplier name or repair agency" /></div>
      <div><label style={fieldLabel}>Remarks</label><textarea value={remarks} onChange={(e) => setRemarks(e.target.value)} style={{ ...inputStyle, minHeight: 60 }} /></div>
    </FormShell>
  );
}

function IssueForm({ materials, onSubmit, showToast }) {
  const [materialId, setMaterialId] = useMaterialSelect(materials);
  const [qty, setQty] = useState(1);
  const [issuedTo, setIssuedTo] = useState("");
  const [purpose, setPurpose] = useState("");
  const selected = materials.find((m) => m.id === materialId);
  const handle = (e) => {
    e.preventDefault();
    if (!materialId || qty <= 0) return;
    if (selected && Number(qty) > Number(selected.qty)) { showToast("Issue quantity exceeds available stock — negative stock is not allowed.", "error"); return; }
    onSubmit(materialId, -Number(qty), "Issue", { issuedTo, purpose });
    showToast(`Issue voucher posted: -${qty} unit(s) issued.`);
    setQty(1); setIssuedTo(""); setPurpose("");
  };
  return (
    <FormShell title="Material Issue Voucher" onSubmit={handle} submitLabel="Post Issue" submitColor={ORANGE}>
      <div>
        <label style={fieldLabel}>Material</label>
        <select value={materialId} onChange={(e) => setMaterialId(e.target.value)} style={inputStyle}>
          {materials.map((m) => <option key={m.id} value={m.id}>{m.code} — {m.name} (Avail: {m.qty})</option>)}
        </select>
      </div>
      <div style={{ display: "flex", gap: 12 }}>
        <div style={{ flex: 1 }}><label style={fieldLabel}>Quantity to Issue</label><input type="number" min={1} value={qty} onChange={(e) => setQty(e.target.value)} style={inputStyle} /></div>
        <div style={{ flex: 1 }}><label style={fieldLabel}>Issued To (Section / Sub-Division)</label><input value={issuedTo} onChange={(e) => setIssuedTo(e.target.value)} style={inputStyle} /></div>
      </div>
      <div><label style={fieldLabel}>Purpose</label><input value={purpose} onChange={(e) => setPurpose(e.target.value)} style={inputStyle} placeholder="e.g. Replacement against burnt transformer complaint" /></div>
    </FormShell>
  );
}

function TransferForm({ materials, onSubmit, showToast }) {
  const [materialId, setMaterialId] = useMaterialSelect(materials);
  const [qty, setQty] = useState(1);
  const [fromStore, setFromStore] = useState(STORES[0]);
  const [toStore, setToStore] = useState(STORES[1]);
  const selected = materials.find((m) => m.id === materialId);
  const handle = (e) => {
    e.preventDefault();
    if (!materialId || qty <= 0 || fromStore === toStore) return;
    if (selected && Number(qty) > Number(selected.qty)) { showToast("Transfer quantity exceeds available stock.", "error"); return; }
    onSubmit(materialId, 0, "Transfer", { fromStore, toStore, movedQty: qty });
    showToast(`Transfer logged: ${qty} unit(s) from ${fromStore} to ${toStore}.`);
    setQty(1);
  };
  return (
    <FormShell title="Stock Transfer Between Stores" onSubmit={handle} submitLabel="Record Transfer">
      <div>
        <label style={fieldLabel}>Material</label>
        <select value={materialId} onChange={(e) => setMaterialId(e.target.value)} style={inputStyle}>
          {materials.map((m) => <option key={m.id} value={m.id}>{m.code} — {m.name} (Avail: {m.qty})</option>)}
        </select>
      </div>
      <div style={{ display: "flex", gap: 12 }}>
        <div style={{ flex: 1 }}><label style={fieldLabel}>From Store</label><select value={fromStore} onChange={(e) => setFromStore(e.target.value)} style={inputStyle}>{STORES.map((s) => <option key={s}>{s}</option>)}</select></div>
        <div style={{ flex: 1 }}><label style={fieldLabel}>To Store</label><select value={toStore} onChange={(e) => setToStore(e.target.value)} style={inputStyle}>{STORES.map((s) => <option key={s}>{s}</option>)}</select></div>
      </div>
      <div><label style={fieldLabel}>Quantity</label><input type="number" min={1} value={qty} onChange={(e) => setQty(e.target.value)} style={inputStyle} /></div>
    </FormShell>
  );
}

function DeadStock({ materials, txns, onSubmit, showToast }) {
  const failMaterials = materials.filter((m) => m.group !== "New/Repair");
  const [materialId, setMaterialId] = useState(failMaterials[0]?.id || "");
  const [qty, setQty] = useState(1);
  const [action, setAction] = useState("Condemnation");
  const selected = materials.find((m) => m.id === materialId);
  const handle = (e) => {
    e.preventDefault();
    if (!materialId || qty <= 0) return;
    if (selected && Number(qty) > Number(selected.qty)) { showToast("Quantity exceeds available failed-transformer stock.", "error"); return; }
    onSubmit(materialId, -Number(qty), "DeadStock", { action });
    showToast(`${action} recorded for ${qty} unit(s).`);
    setQty(1);
  };
  const disposalLog = txns.filter((t) => t.type === "DeadStock");
  return (
    <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
      <FormShell title="Dead Stock / Scrap Disposal" onSubmit={handle} submitLabel="Record Action" submitColor="#dc2626">
        <div>
          <label style={fieldLabel}>Failed Transformer</label>
          <select value={materialId} onChange={(e) => setMaterialId(e.target.value)} style={inputStyle}>
            {failMaterials.map((m) => <option key={m.id} value={m.id}>{m.code} — {m.name} (Avail: {m.qty})</option>)}
          </select>
        </div>
        <div style={{ display: "flex", gap: 12 }}>
          <div style={{ flex: 1 }}><label style={fieldLabel}>Quantity</label><input type="number" min={1} value={qty} onChange={(e) => setQty(e.target.value)} style={inputStyle} /></div>
          <div style={{ flex: 1 }}><label style={fieldLabel}>Action</label><select value={action} onChange={(e) => setAction(e.target.value)} style={inputStyle}>{["Inspection", "Condemnation", "Auction", "Scrap Disposal"].map((a) => <option key={a}>{a}</option>)}</select></div>
        </div>
      </FormShell>
      <div style={{ background: "white", borderRadius: 10, border: "1px solid #e2e8f0", padding: 16, flex: "1 1 340px" }}>
        <div style={{ fontWeight: 700, marginBottom: 10 }}>Disposal Register</div>
        {disposalLog.length === 0 ? <div style={{ color: "#94a3b8", fontSize: 13 }}>No disposal actions recorded yet.</div> : (
          <table style={{ width: "100%", fontSize: 12.5, borderCollapse: "collapse" }}>
            <thead><tr style={{ textAlign: "left", color: "#64748b" }}><th style={{ padding: "6px 4px" }}>Date</th><th>Material</th><th>Qty</th><th>Action</th></tr></thead>
            <tbody>
              {disposalLog.map((t) => {
                const m = materials.find((mm) => mm.id === t.materialId);
                return <tr key={t.id} style={{ borderTop: "1px solid #f1f5f9" }}><td style={{ padding: "6px 4px" }}>{t.date}</td><td>{m?.name}</td><td>{t.qty}</td><td>{t.action}</td></tr>;
              })}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

function Reports({ materials, txns, onExport }) {
  const receipts = txns.filter((t) => t.type === "Receipt");
  const issues = txns.filter((t) => t.type === "Issue");
  const transfers = txns.filter((t) => t.type === "Transfer");
  const Section = ({ title, rows, cols }) => (
    <div style={{ background: "white", borderRadius: 10, border: "1px solid #e2e8f0", padding: 16, marginBottom: 16 }}>
      <div style={{ fontWeight: 700, marginBottom: 10 }}>{title} ({rows.length})</div>
      {rows.length === 0 ? <div style={{ color: "#94a3b8", fontSize: 13 }}>No records yet.</div> : (
        <div style={{ overflowX: "auto" }}>
          <table style={{ width: "100%", fontSize: 12.5, borderCollapse: "collapse" }}>
            <thead><tr style={{ textAlign: "left", color: "#64748b" }}>{cols.map((c) => <th key={c} style={{ padding: "6px 4px" }}>{c}</th>)}</tr></thead>
            <tbody>
              {rows.map((t) => {
                const m = materials.find((mm) => mm.id === t.materialId);
                return (
                  <tr key={t.id} style={{ borderTop: "1px solid #f1f5f9" }}>
                    <td style={{ padding: "6px 4px" }}>{t.date}</td><td>{m?.name}</td><td>{t.qty}</td>
                    <td>{t.supplier || t.issuedTo || t.fromStore || "—"}</td>
                    <td>{t.invoice || t.purpose || (t.toStore ? `→ ${t.toStore}` : "—")}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 12 }}>
        <button onClick={onExport} style={btnStyle(ORANGE)}><IconDownload size={14} /> Export Stock Register (CSV)</button>
      </div>
      <Section title="Material Receipt Register" rows={receipts} cols={["Date", "Material", "Qty", "Supplier", "Invoice"]} />
      <Section title="Material Issue Register" rows={issues} cols={["Date", "Material", "Qty", "Issued To", "Purpose"]} />
      <Section title="Stock Transfer Register" rows={transfers} cols={["Date", "Material", "Qty", "From Store", "To Store"]} />
    </div>
  );
}

function SIMMSApp() {
  const [authed, setAuthed] = useState(false);
  if (!authed) return <LoginGate onSuccess={() => setAuthed(true)} />;
  return <SIMMSAppInner onLogout={() => setAuthed(false)} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<SIMMSApp />);
</script>


</body></html>
